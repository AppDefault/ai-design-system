<!-- @dsCard group="Colors" viewport="700x150" name="Magenta — premium & PRO" subtitle="Reserved for paid / upgrade surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px}
.row{display:flex;gap:14px}.sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border-1)}
.chip{height:66px}.cap{padding:9px 11px}.n{font-size:12.5px;font-weight:600;color:var(--text-primary)}.v{font:var(--meta);color:var(--text-muted);margin-top:3px}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--magenta)"></div><div class="cap"><div class="n">magenta</div><div class="v">#d946ef</div></div></div>
<div class="sw"><div class="chip" style="background:var(--magenta-light)"></div><div class="cap"><div class="n">magenta-light</div><div class="v">#f0abfc</div></div></div>
<div class="sw"><div class="chip" style="background:var(--premium-cta)"></div><div class="cap"><div class="n">premium-cta</div><div class="v">135° gradient</div></div></div>
<div class="sw"><div class="chip" style="background:var(--magenta-soft);border-bottom:1px solid var(--magenta-border)"></div><div class="cap"><div class="n">magenta-soft</div><div class="v">magenta .08</div></div></div>
</div></body></html>
