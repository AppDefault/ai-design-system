<!-- @dsCard group="Brand" viewport="700x220" name="Character placeholder" subtitle="Gradient + diagonal hatch + giant serif initial" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);padding:26px 30px;display:flex;gap:18px;font-family:var(--font-sans)}
.ph{width:132px;aspect-ratio:4/5;border-radius:var(--radius-card);border:1px solid var(--border-1);overflow:hidden;
background:var(--placeholder-hatch),var(--placeholder-fill);display:flex;align-items:center;justify-content:center;position:relative}
.i{font-family:var(--font-display);font-size:76px;font-weight:600;color:var(--text-faint)}
.note{align-self:center;font:var(--meta);letter-spacing:.06em;color:var(--text-muted);line-height:1.8;max-width:300px}</style></head>
<body>
<div class="ph"><span class="i">A</span></div>
<div class="ph"><span class="i">L</span></div>
<div class="ph"><span class="i">N</span></div>
<div class="note">When no portrait is loaded, characters fall back to this motif: a warm violet→black gradient, a 135° hairline hatch, and the initial in near-invisible serif (text-faint · white .055).</div>
</body></html>
