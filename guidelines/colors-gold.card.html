<!-- @dsCard group="Colors" viewport="700x150" name="Gold — primary action" subtitle="The one CTA accent + its tint" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px}
.row{display:flex;gap:14px}.sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border-1)}
.chip{height:66px}.cap{padding:9px 11px}.n{font-size:12.5px;font-weight:600;color:#fff}.v{font:var(--meta);color:var(--text-muted);margin-top:3px}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--gold)"></div><div class="cap"><div class="n">gold</div><div class="v">#facc15</div></div></div>
<div class="sw"><div class="chip" style="background:var(--gold-hover)"></div><div class="cap"><div class="n">gold-hover</div><div class="v">#fde047</div></div></div>
<div class="sw"><div class="chip" style="background:var(--gold-soft)"></div><div class="cap"><div class="n">gold-soft</div><div class="v">gold .14 · user bubble</div></div></div>
<div class="sw"><div class="chip" style="background:var(--gold-tint-text)"></div><div class="cap"><div class="n">gold-tint-text</div><div class="v">#fef3c7</div></div></div>
</div></body></html>
