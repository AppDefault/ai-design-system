<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & text ramp" subtitle="Status colors + white-alpha text steps" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px}
.row{display:flex;gap:14px}.sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border-1)}
.chip{height:66px;display:flex;align-items:flex-end;padding:8px;font:var(--meta)}.cap{padding:9px 11px}.n{font-size:12.5px;font-weight:600;color:var(--text-primary)}.v{font:var(--meta);color:var(--text-muted);margin-top:3px}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--success)"></div><div class="cap"><div class="n">success</div><div class="v">#4ade80</div></div></div>
<div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="cap"><div class="n">danger</div><div class="v">#f87171</div></div></div>
<div class="sw" style="background:var(--surface-panel)"><div class="chip" style="color:var(--text-primary)">primary</div><div class="cap"><div class="v" style="color:var(--text-secondary)">secondary .55</div><div class="v" style="color:var(--text-muted)">muted .35</div></div></div>
</div></body></html>
