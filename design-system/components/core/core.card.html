<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text-primary); padding: 28px 32px; }

  section { margin-bottom: 8px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Chip, Tag, Badge, Input } = window.AIGirlNoirEditorialDesignSystem_ffacee;
const SearchIcon = (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>
  </svg>
);
function Demo() {
  return (
    <div>
      <section>
        <p className="lbl">Buttons</p>
        <div className="row">
          <Button variant="primary">Search</Button>
          <Button variant="secondary">Restart chat</Button>
          <Button variant="premium" icon={<span>✦</span>}>Go Premium</Button>
          <Button variant="ghost">Report content</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <Button variant="primary" size="sm">Small</Button>
          <Button variant="primary" size="md">Medium</Button>
          <Button variant="primary" size="lg">Large</Button>
        </div>
      </section>
      <section>
        <p className="lbl">Chips — filter row</p>
        <div className="row">
          <Chip active>All</Chip><Chip>Anime</Chip><Chip>Movie</Chip>
          <Chip>Celebrity</Chip><Chip>Original</Chip><Chip>Fantasy</Chip>
        </div>
      </section>
      <section>
        <p className="lbl">Tags & Badges</p>
        <div className="row">
          <Tag>Female</Tag><Tag>Original</Tag><Tag>Romantic</Tag>
          <Badge variant="pro">PRO</Badge>
          <Badge variant="stat">1.8M</Badge>
          <Badge variant="premium">✦ Premium</Badge>
        </div>
      </section>
      <section>
        <p className="lbl">Inputs</p>
        <div style={{display:'flex',gap:12,maxWidth:520}}>
          <Input placeholder="Search characters by name or mood…" icon={SearchIcon} />
          <Button variant="primary" size="lg">Search</Button>
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>
