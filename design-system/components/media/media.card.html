<!-- @dsCard group="Components" viewport="700x460" name="Media — Avatar & CharacterCard" subtitle="Character discovery card + gradient avatars" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); color: var(--text-primary); padding: 28px 32px; }
  .lbl { font: var(--kicker); letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 14px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { CharacterCard, Avatar } = window.AIGirlNoirEditorialDesignSystem_ffacee;
function Demo() {
  return (
    <div style={{display:'flex',gap:40,alignItems:'flex-start'}}>
      <div style={{display:'grid',gridTemplateColumns:'200px 200px 200px',gap:20,flex:'0 0 auto'}}>
        <CharacterCard name="Annie" category="Original" views="1.8M" pro
          blurb="Your composed new secretary — organized, warm, a little curious." tags={['Female','Romantic']} />
        <CharacterCard name="Son Goku" category="Anime" views="512K"
          blurb="The Saiyan raised on Earth. Cheerful, loyal, always hungry." tags={['Male','Hero']} />
        <CharacterCard name="Scarra" category="Fantasy"
          blurb="A loyal companion from the northern woods — devoted and shy." tags={['Non-human']} />
      </div>
      <div>
        <p className="lbl">Avatars</p>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <Avatar initial="A" size={64} />
          <Avatar initial="L" size={48} />
          <Avatar initial="S" size={40} />
          <Avatar initial="M" size={40} shape="circle" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
