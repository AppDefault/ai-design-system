<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="./styles.css">
<style>
  html,body{margin:0}
  .tile{width:1280px;height:854px;display:flex;background:var(--bg)}
  .main{flex:1;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1100px 520px at 50% 32%,rgba(217,70,239,.10),transparent),var(--bg)}
  .mark{font-family:var(--font-display);font-weight:600;font-size:210px;letter-spacing:-.02em;color:#fff}
  .mark span{color:var(--gold)}
  .strip{width:300px;display:flex;flex-direction:column}
  .strip div{flex:1}
</style></head>
<body>
<div class="tile">
  <div class="main"><div class="mark">AI<span>Girl</span></div></div>
  <div class="strip">
    <div style="background:#f0abfc"></div>
    <div style="background:#facc15"></div>
    <div style="background:#4ade80"></div>
    <div style="background:#d946ef"></div>
  </div>
</div>
</body></html>
