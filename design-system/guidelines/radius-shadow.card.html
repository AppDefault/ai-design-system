<!-- @dsCard group="Spacing" viewport="700x160" name="Radius & shadow" subtitle="badges 6 · controls 11–12 · panels 20 · pill" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);padding:26px 30px;font-family:var(--font-mono)}
.row{display:flex;gap:22px;align-items:center}.c{display:flex;flex-direction:column;align-items:center;gap:9px}
.b{width:74px;height:56px;background:var(--surface-3);border:1px solid var(--border-strong)}
.l{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="row">
<div class="c"><div class="b" style="border-radius:var(--radius-xs)"></div><div class="l">xs 6</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><div class="l">md 11</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-card)"></div><div class="l">card 12</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="l">lg 16</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-panel)"></div><div class="l">panel 20</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-pill)"></div><div class="l">pill</div></div>
<div class="c"><div class="b" style="border-radius:var(--radius-card);box-shadow:var(--shadow-panel);border-color:transparent"></div><div class="l">panel shadow</div></div>
</div></body></html>
