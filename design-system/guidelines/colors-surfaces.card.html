<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Near-black warm base + white-alpha layers" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px}
.row{display:flex;gap:14px}.sw{flex:1;border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--border-1)}
.chip{height:66px}.cap{padding:9px 11px}.n{font-size:12.5px;font-weight:600;color:#fff}.v{font:var(--meta);color:var(--text-muted);margin-top:3px}</style></head>
<body><div class="row">
<div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="cap"><div class="n">bg</div><div class="v">#07060a</div></div></div>
<div class="sw"><div class="chip" style="background:var(--surface-panel)"></div><div class="cap"><div class="n">surface-panel</div><div class="v">#0a0910</div></div></div>
<div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="cap"><div class="n">surface-1</div><div class="v">white .04</div></div></div>
<div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="cap"><div class="n">surface-3</div><div class="v">white .06</div></div></div>
</div></body></html>
