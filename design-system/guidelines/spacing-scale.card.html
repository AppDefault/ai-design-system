<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">

.bar{background:var(--gold);width:22px;border-radius:3px}.l{font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="row">

<div class="c"><div class="bar" style="height:14px"></div><div class="l">4·14</div></div>
<div class="c"><div class="bar" style="height:20px"></div><div class="l">6·20</div></div>
<div class="c"><div class="bar" style="height:28px"></div><div class="l">8·28</div></div>
<div class="c"><div class="bar" style="height:40px"></div><div class="l">10·40</div></div>
<div class="c"><div class="bar" style="height:48px"></div><div class="l">12·48</div></div>
<div class="c"><div class="bar" style="height:80px"></div><div class="l">16·80</div></div>
</div></body></html>
